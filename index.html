<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STL Painter — Demo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #1a1d21;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      #app {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 14px;
        color: #cdd3da;
        font-size: 13px;
        line-height: 1.45;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }
      #hud b {
        color: #f0f3f6;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #1a1d21;
        color: #cdd3da;
        font-size: 15px;
        transition: opacity 0.4s ease;
      }
      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #drophint {
        position: fixed;
        inset: 16px;
        z-index: 10;
        display: none;
        place-items: center;
        border: 2px dashed #5a93c8;
        border-radius: 12px;
        background: rgba(26, 29, 33, 0.7);
        color: #dce3ea;
        font-size: 18px;
        pointer-events: none;
      }
      #drophint.show {
        display: grid;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="hud"></div>
    <div id="drophint">Drop a .stl (fresh) or .ply (recover colors) to load</div>
    <div id="overlay">Loading model…</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
